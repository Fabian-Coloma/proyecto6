<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Cuenta de Banco</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-linear-to-br from-gray-900 to-blue-900 flex items-center justify-center min-h-screen font-sans">

  <div class="bg-gray-800 w-full max-w-sm p-8 rounded-[2.5rem] shadow-2xl border border-gray-700">

    <h1 class="text-3xl font-extrabold text-center text-transparent bg-clip-text bg--to-r from-teal-400 to-blue-400 mb-8">
      Cuenta de Banco
    </h1>

    <div class="flex flex-col items-center bg-gray-900/60 py-6 rounded-3xl border border-gray-700 mb-8 shadow-inner">
      <p class="text-gray-400 text-xs tracking-widest uppercase mb-1">Tu saldo actual</p>
      
      <h2 id="saldo" class="text-5xl font-black text-white tracking-tight">
        $0.00
      </h2>
    </div>

    <div class="mb-6">
      <input
        type="number"
        id="monto"
        placeholder="Ingresa la cantidad..."
        class="w-full bg-gray-900 border border-gray-600 text-white rounded-2xl p-4 text-center text-lg focus:outline-none focus:border-teal-400 focus:ring-1 focus:ring-teal-400 transition-colors"
      >
    </div>

    <div class="grid grid-cols-2 gap-4 mb-4">
      
      <button
        onclick="depositar()"
        class="bg-teal-500/20 text-teal-400 border border-teal-500/50 hover:bg-teal-500 hover:text-white py-3 rounded-2xl font-bold transition-all duration-300 active:scale-95"
      >
        Abonar
      </button>

      <button
        onclick="retirar()"
        class="bg-rose-500/20 text-rose-400 border border-rose-500/50 hover:bg-rose-500 hover:text-white py-3 rounded-2xl font-bold transition-all duration-300 active:scale-95"
      >
        Extraer
      </button>
    </div>

    <button
      onclick="consultarSaldo()"
      class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-bold transition-all duration-300 active:scale-95 shadow-lg shadow-blue-900/50"
    >
      Actualizar Estado
    </button>
<!-- 
    <div
      id="mensaje"
      class="mt-6 text-center text-sm font-medium text-gray-300 min-h-[24px]"
    >
    </div> -->

  </div>

  <script src="./scripts/main.js"></script>

</body>
</html>
